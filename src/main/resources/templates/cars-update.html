<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Car</title>
    <style>
        form {
            width: 400px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="number"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 6px;
            margin-top: 4px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        textarea {
            resize: vertical;
        }
        .submit-btn {
            margin-top: 15px;
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .back-btn {
            margin-top: 10px;
            display: inline-block;
            padding: 6px 12px;
            background-color: #2196F3;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        .error-msg {
            color: red;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<h1>Update Car</h1>

<form th:action="@{/cars/edit/{id}(id=${carId})}" th:object="${updateCarDTO}" method="post">

    <label>Name:</label>
    <label>
        <input type="text" th:field="*{name}" />
    </label>
    <span class="error-msg" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>

    <label>Brand:</label>
    <label>
        <input type="text" th:field="*{brand}" />
    </label>
    <span class="error-msg" th:if="${#fields.hasErrors('brand')}" th:errors="*{brand}"></span>

    <label>Horsepower:</label>
    <label>
        <input type="number" th:field="*{horsepower}" />
    </label>
    <span class="error-msg" th:if="${#fields.hasErrors('horsepower')}" th:errors="*{horsepower}"></span>

    <label>Manufacture Date:</label>
    <label>
        <input type="date" th:field="*{manufactureDate}" />
    </label>
    <span class="error-msg" th:if="${#fields.hasErrors('manufactureDate')}" th:errors="*{manufactureDate}"></span>

    <label>Description:</label>
    <label>
        <textarea th:field="*{description}"></textarea>
    </label>
    <span class="error-msg" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>

    <button type="submit" class="submit-btn">Update Car</button>
</form>

<br/>
<a th:href="@{/cars}" class="back-btn">Back to car list</a>

</body>
</html>
